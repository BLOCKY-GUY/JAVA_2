<!DOCTYPE html>
<html lang="en">
<body>
    <p>A function can access variables defined inside the funtion:</p>
    <button type="button" onclick="myFunction()"> Click Me!</button>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>

    <script>
        var b = 8;
        var a = 6;
        function myFunction() {
            var a = 3;
            document.getElementById("demo1").innerHTML = b * a;
        }
        document.getElementById("demo2").innerHTML = b;
        document.getElementById("demo3").innerHTML = a;
    </script>
</body>
</html>
